; Aumentar límites para importaciones grandes
memory_limit = 1024M
upload_max_filesize = 2G
post_max_size = 2G
max_execution_time = 3600
max_input_time = 3600

; Configuraciones adicionales para WordPress y All-in-One WP Migration
max_file_uploads = 200
max_input_vars = 5000

; Prevenir timeouts durante la importación
default_socket_timeout = 600
mysql.connect_timeout = 600

; Configuraciones específicas para All-in-One WP Migration
ai1wm_backup_chunk_size = 10
ai1wm_import_chunk_size = 10
